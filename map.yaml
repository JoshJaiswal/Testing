# canonical/mapping-matrix.yaml
mappings:

  # ── Deal Intake Analyzer ──────────────────────────────────────────────────
  - canonicalPath: parties.client.name
    sourceAnalyzer: deal_intake
    sourceField: customerLegalName
    transform: as_is
    precedence: 5

  - canonicalPath: parties.vendor.name
    sourceAnalyzer: deal_intake
    sourceField: vendorLegalName
    transform: as_is
    precedence: 5

  - canonicalPath: commercials.totalValue
    sourceAnalyzer: deal_intake
    sourceField: setupFee
    transform: as_is
    precedence: 5

  - canonicalPath: commercials.currency
    sourceAnalyzer: deal_intake
    sourceField: currency
    transform: as_is
    precedence: 5

  - canonicalPath: commercials.paymentTerms
    sourceAnalyzer: deal_intake
    sourceField: invoicingTerms
    transform: as_is
    precedence: 5

  - canonicalPath: scope.description
    sourceAnalyzer: deal_intake
    sourceField: sowObjective
    transform: as_is
    precedence: 5

  - canonicalPath: legal.governingLaw
    sourceAnalyzer: deal_intake
    sourceField: governingLaw
    transform: as_is
    precedence: 4

  - canonicalPath: confidentiality.term
    sourceAnalyzer: deal_intake
    sourceField: confidentialityTermYears
    transform: as_is
    precedence: 4

  - canonicalPath: parties.client.name
    sourceAnalyzer: nda
    sourceField: disclosingParty
    transform: as_is
    precedence: 5

  - canonicalPath: risks
    sourceAnalyzer: deal_intake
    sourceField: extractedConflicts
    transform: as_is
    precedence: 5

  - canonicalPath: dates.effectiveDate
    sourceAnalyzer: deal_intake
    sourceField: ndaTargetExecutionDate
    transform: as_is
    precedence: 4

  - canonicalPath: scope.deliverables
    sourceAnalyzer: deal_intake
    sourceField: inScope
    transform: as_is
    precedence: 5

  
  # ── NDA Analyzer ─────────────────────────────────────────────────────────
  - canonicalPath: parties.client.name
    sourceAnalyzer: nda
    sourceField: disclosingParty
    transform: as_is
    precedence: 5

  - canonicalPath: parties.vendor.name
    sourceAnalyzer: nda
    sourceField: receivingParty
    transform: as_is
    precedence: 5

  - canonicalPath: confidentiality.term
    sourceAnalyzer: nda
    sourceField: confidentialityTermYears
    transform: as_is
    precedence: 5

  - canonicalPath: confidentiality.exceptions
    sourceAnalyzer: nda
    sourceField: exclusionsFromConfidentialInfo
    transform: as_is
    precedence: 5

  - canonicalPath: legal.governingLaw
    sourceAnalyzer: nda
    sourceField: governingLaw
    transform: as_is
    precedence: 5

  - canonicalPath: legal.jurisdiction
    sourceAnalyzer: nda
    sourceField: dataResidencyRequirements
    transform: as_is
    precedence: 3
